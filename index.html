<!DOCTYPE html>
<html lang="zh">
<head>
  <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RADAR 研报 · HBM · 内存 · 算力 · RISC-V</title>
<meta name="theme-color" content="#f5f6f3">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f2;--card:#ffffff;--ink:#161916;--muted:#6c736b;
    --green:#147a45;--red:#cc3a33;--blue:#22579f;--gold:#bd8316;
    --line:#e3e5e0;--soft:#eef0ec;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);
    font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;padding-bottom:28px;}
  .num{font-family:"Space Grotesk",sans-serif;}
  .wrap{max-width:940px;margin:0 auto;padding:0 16px;}
  header{background:var(--card);border-bottom:2px solid var(--ink);
    padding-top:calc(14px + env(safe-area-inset-top,0));padding-bottom:13px;}
  .mast{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .ttl{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:23px;letter-spacing:.04em;
    display:flex;align-items:baseline;gap:8px;}
  .ttl b{color:var(--green);}
  .ttl .zh{font-family:Inter,"PingFang SC",sans-serif;font-weight:700;font-size:17px;letter-spacing:0;}
  .sub{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.02em;}
  .refresh{flex:none;display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--ink);
    color:#fff;border:none;border-radius:7px;font-size:12px;padding:8px 13px;font-weight:600;}
  .refresh:active{opacity:.8;}
  .refresh svg{width:13px;height:13px;}
  .sh{display:flex;align-items:center;gap:10px;margin:26px 0 14px;}
  .sh .no{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;
    color:var(--muted);white-space:nowrap;}
  .sh .ti{font-weight:700;font-size:16px;white-space:nowrap;}
  .sh .ti b{color:var(--green);}
  .sh .ln{flex:1;height:1px;background:var(--line);}
  .sh .tg{font-family:"Space Grotesk",sans-serif;font-size:11px;color:var(--muted);white-space:nowrap;}
  .hero{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
  .hc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;
    position:relative;overflow:hidden;}
  .hc .nm{font-weight:700;font-size:14px;}
  .hc .tk{font-family:"Space Grotesk",sans-serif;font-size:10px;color:var(--muted);margin-top:2px;}
  .hc .pct{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:30px;line-height:1;margin-top:12px;}
  .hc .pr{font-family:"Space Grotesk",sans-serif;font-size:12px;color:var(--muted);margin-top:7px;}
  .up{color:var(--green);} .down{color:var(--red);} .flat{color:var(--muted);}
  .hc.up{border-color:rgba(20,122,69,.35);} .hc.down{border-color:rgba(204,58,51,.35);}
  .hc .bar{position:absolute;left:0;top:0;bottom:0;width:4px;}
  .hc.up .bar{background:var(--green);} .hc.down .bar{background:var(--red);}
  .lead{display:block;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:16px;}
  .lead.star{border-color:rgba(20,122,69,.4);border-left:5px solid var(--green);}
  .lead .zh{font-weight:700;font-size:17px;line-height:1.4;}
  .lead.star .zh{color:var(--green);}
  .lead.mu{border-color:rgba(189,131,22,.4);border-left:5px solid var(--gold);}
  .lead.mu .zh{color:var(--gold);}
  .lead .meta,.row .meta{font-size:11px;color:var(--muted);margin-top:9px;display:flex;gap:9px;align-items:center;}
  .lead .meta .s,.row .meta .s{font-family:"Space Grotesk",sans-serif;font-weight:600;color:var(--blue);}
  .rows{margin-top:8px;}
  .row{display:block;text-decoration:none;color:inherit;padding:12px 4px;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row:active,.lead:active{opacity:.65;}
  .row .zh{font-weight:500;font-size:13.5px;line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .row .meta{margin-top:6px;}
  .empty{font-size:12px;color:var(--muted);padding:14px;background:var(--card);
    border:1px dashed var(--line);border-radius:12px;}
  .loading{text-align:center;padding:60px 20px;color:var(--muted);}
  .spinner{width:24px;height:24px;border:2.5px solid var(--line);border-top-color:var(--green);
    border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .updbar{font-size:11px;color:var(--muted);margin-top:14px;display:flex;align-items:center;gap:6px;}
  .updbar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}
  footer{text-align:center;color:var(--muted);font-size:10px;padding:26px 16px 0;line-height:1.8;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="mast">
    <div>
      <div class="ttl">RA<b>D</b>AR <span class="zh">研报</span></div>
      <div class="sub">HBM · 内存 · 算力 · RISC-V　/　每 6 小时自动更新</div>
    </div>
    <button class="refresh" id="refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0020.5 15"/></svg>
      刷新
    </button>
  </div>
  <div class="updbar" id="upd"><span class="dot"></span>载入中…</div>
</div></header>
<main class="wrap" id="app">
  <div class="loading"><div class="spinner"></div>拉取中…</div>
</main>
<footer>RADAR 研报 · 自动聚合 · 中文为机器翻译，点进看原文<br>仅供参考，非投资建议</footer>
<script>
const app=document.getElementById('app'), updEl=document.getElementById('upd');
function rel(iso){if(!iso)return'';const d=new Date(iso),m=Math.floor((Date.now()-d)/60000);
  if(m<1)return'刚刚';if(m<60)return m+'分钟前';const h=Math.floor(m/60);
  if(h<24)return h+'小时前';return Math.floor(h/24)+'天前';}
function shortName(s){return {Micron:'Micron',Samsung:'三星','SK hynix':'海力士','Ingenic 君正':'君正'}[s.name]||s.name;}
function fmtPrice(s){if(s.price==null)return'—';const sym={USD:'$',CNY:'¥',KRW:'₩'}[s.ccy]||'';
  let v=s.price;if(v>=1e6)return sym+(v/1e6).toFixed(2)+'M';if(v>=1e5)return sym+(v/1e3).toFixed(0)+'k';
  return sym+v.toLocaleString();}
function hcard(s){
  const has=s.chg!=null, cls=has?(s.chg>0?'up':(s.chg<0?'down':'flat')):'flat';
  const arr=has?(s.chg>0?'▲':(s.chg<0?'▼':'')):''; const g=has&&s.chg>0?'+':'';
  const pct=has?(arr+' '+g+s.chg+'%'):'—';
  return '<div class="hc '+cls+'"><span class="bar"></span>'
    +'<div class="nm">'+shortName(s)+'</div><div class="tk">'+s.tick+'</div>'
    +'<div class="pct '+cls+'">'+pct+'</div>'
    +'<div class="pr">'+fmtPrice(s)+' '+s.ccy+'</div></div>';
}
function leadItem(it,star){
  const txt=it.zh||it.title;
  return '<a class="lead'+(star?' '+star:'')+'" href="'+it.link+'" target="_blank" rel="noopener">'
    +'<div class="zh">'+txt+'</div>'
    +'<div class="meta"><span class="s">'+(it.src||'')+'</span><span>'+rel(it.date)+'</span></div></a>';
}
function rowItem(it){
  const txt=it.zh||it.title;
  return '<a class="row" href="'+it.link+'" target="_blank" rel="noopener">'
    +'<div class="zh">'+txt+'</div>'
    +'<div class="meta"><span class="s">'+(it.src||'')+'</span><span>'+rel(it.date)+'</span></div></a>';
}
function secHead(no,title,n){
  return '<div class="sh"><span class="no">SECTION '+no+'</span><span class="ti">'+title+'</span>'
    +'<span class="ln"></span><span class="tg">'+n+' 条</span></div>';
}
function newsSec(no,title,items,star){
  const list=items||[];
  let body;
  if(!list.length){body='<div class="empty">// 暂无相关新闻</div>';}
  else{
    body=leadItem(list[0],star);
    const rest=list.slice(1,4);
    if(rest.length)body+='<div class="rows">'+rest.map(rowItem).join('')+'</div>';
  }
  return secHead(no,title,list.length)+body;
}
function render(d){
  updEl.innerHTML='<span class="dot"></span> 更新于 '+rel(d.updated)+' · UTC';
  let html=secHead('01','<b>行情</b> · 持仓关注',d.stocks.length);
  html+='<div class="hero">'+d.stocks.map(hcard).join('')+'</div>';
  html+=newsSec('02','<b>美光</b> · 专题',d.micron,'mu');
  html+=newsSec('03','<b>HBM</b> · 高带宽内存',d.hbm,'star');
  html+=newsSec('04','内存 · DRAM / NAND',d.memory,'');
  html+=newsSec('05','算力 · GPU / CPU / TPU',d.compute,'');
  html+=newsSec('06','RISC-V · 工业化',d.riscv,'');
  app.innerHTML=html;
}
async function load(){try{const r=await fetch('data.json?t='+Date.now());
  if(!r.ok)throw new Error('data.json '+r.status);render(await r.json());}
  catch(e){app.innerHTML='<div class="loading">拉取失败：'+e.message+'<br><br>刚部署的话等 Actions 跑完再刷新</div>';updEl.textContent='';}}
document.getElementById('refresh').addEventListener('click',load);
load();
</script>
</body>
</html>
