<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RADAR · 内存 · 算力 · RISC-V</title>
<meta name="theme-color" content="#0b0e14">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0e14;--surface:#131925;--line:rgba(150,170,200,.13);
    --text:#e7ecf3;--muted:#8995a8;--copper:#d98a4f;--up:#46b39a;--down:#e0726a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;padding-bottom:24px;}
  .mono{font-family:"IBM Plex Mono",monospace;}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px;}
  header{padding-top:calc(12px + env(safe-area-inset-top,0));padding-bottom:12px;
    border-bottom:1px solid var(--line);}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .nm{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:19px;letter-spacing:.16em;}
  .nm b{color:var(--copper);}
  .upd{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--muted);margin-top:5px;}
  .upd .dot{color:var(--up);}
  .refresh{flex:none;display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--surface);
    border:1px solid var(--line);border-radius:100px;color:var(--text);font-size:12px;
    padding:8px 13px;font-family:"IBM Plex Mono",monospace;}
  .refresh:active{transform:scale(.96);}
  .refresh svg{width:13px;height:13px;}
  .ticks{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px;}
  .tk{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 8px;text-align:center;}
  .tk .n{font-size:10.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tk .c{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;margin-top:5px;}
  .tk .p{font-family:"IBM Plex Mono",monospace;font-size:9.5px;color:var(--muted);margin-top:3px;}
  .up{color:var(--up);} .down{color:var(--down);} .flat{color:var(--muted);}
  .cat{margin-top:18px;}
  .cat-h{display:flex;align-items:baseline;gap:9px;margin-bottom:8px;}
  .cat-h .lbl{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--copper);}
  .cat-h h2{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15.5px;}
  .it{display:block;text-decoration:none;color:inherit;padding:9px 0;border-bottom:1px solid var(--line);}
  .it:active{opacity:.6;}
  .it:last-child{border-bottom:none;}
  .it .zh{font-size:14px;font-weight:500;line-height:1.42;color:var(--text);}
  .it.sub .zh{font-size:12.5px;font-weight:400;color:#c4ccd8;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
  .it .meta{font-family:"IBM Plex Mono",monospace;font-size:9.5px;color:var(--muted);
    margin-top:5px;display:flex;gap:8px;}
  .it .meta .s{color:var(--copper);}
  .it.sub .meta{margin-top:3px;}
  .empty{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);padding:10px 0;}
  .loading{text-align:center;padding:50px 20px;color:var(--muted);}
  .spinner{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--copper);
    border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  footer{text-align:center;color:var(--muted);font-family:"IBM Plex Mono",monospace;
    font-size:9px;padding:22px 16px 0;line-height:1.7;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="htop">
    <div>
      <div class="nm">RA<b>D</b>AR</div>
      <div class="upd" id="upd">载入中…</div>
    </div>
    <button class="refresh" id="refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0020.5 15"/></svg>
      刷新
    </button>
  </div>
  <div class="ticks" id="ticks"></div>
</div></header>
<main class="wrap" id="app">
  <div class="loading"><div class="spinner"></div>拉取中…</div>
</main>
<footer>每 6 小时自动更新 · 中文为机器翻译，点进看原文 · 仅供参考非投资建议</footer>
<script>
const app=document.getElementById('app'), updEl=document.getElementById('upd'), ticksEl=document.getElementById('ticks');
function rel(iso){if(!iso)return'';const d=new Date(iso),m=Math.floor((Date.now()-d)/60000);
  if(m<1)return'刚刚';if(m<60)return m+'分钟前';const h=Math.floor(m/60);
  if(h<24)return h+'小时前';return Math.floor(h/24)+'天前';}
function shortName(s){return {Micron:'Micron',Samsung:'三星','SK hynix':'海力士','Ingenic 君正':'君正'}[s.name]||s.name;}
function fmtPrice(s){if(s.price==null)return'—';const sym={USD:'$',CNY:'¥',KRW:'₩'}[s.ccy]||'';
  let v=s.price;if(v>=1e6)return sym+(v/1e6).toFixed(2)+'M';if(v>=1e5)return sym+(v/1e3).toFixed(0)+'k';
  return sym+v.toLocaleString();}
function chg(s){if(s.chg==null)return'<span class="flat">—</span>';
  const c=s.chg>0?'up':(s.chg<0?'down':'flat'),a=s.chg>0?'▲':(s.chg<0?'▼':'·'),g=s.chg>0?'+':'';
  return '<span class="'+c+'">'+a+g+s.chg+'%</span>';}
function tick(s){return '<div class="tk"><div class="n">'+shortName(s)+'</div>'
  +'<div class="c">'+chg(s)+'</div><div class="p">'+fmtPrice(s)+'</div></div>';}
function item(it,i){
  const txt=it.zh||it.title;
  return '<a class="it'+(i>0?' sub':'')+'" href="'+it.link+'" target="_blank" rel="noopener">'
    +'<div class="zh">'+txt+'</div>'
    +'<div class="meta"><span class="s">'+(it.src||'')+'</span><span>'+rel(it.date)+'</span></div></a>';
}
function cat(lbl,title,items){
  const top=(items||[]).slice(0,3);
  const body=top.length?top.map(item).join(''):'<div class="empty">// 暂无</div>';
  return '<section class="cat"><div class="cat-h"><span class="lbl">'+lbl+'</span><h2>'+title+'</h2></div>'+body+'</section>';
}
function render(d){
  updEl.innerHTML='<span class="dot">●</span> 更新于 '+rel(d.updated)+' · 每6h自动';
  ticksEl.innerHTML=d.stocks.map(tick).join('');
  app.innerHTML=cat('Memory','内存',d.memory)+cat('Compute','算力 GPU/CPU/TPU',d.compute)+cat('RISC-V','RISC-V 工业化',d.riscv);
}
async function load(){try{const r=await fetch('data.json?t='+Date.now());
  if(!r.ok)throw new Error('data.json '+r.status);render(await r.json());}
  catch(e){app.innerHTML='<div class="loading">拉取失败：'+e.message+'<br><br>刚部署的话等Actions跑完再刷新</div>';updEl.textContent='';}}
document.getElementById('refresh').addEventListener('click',load);
load();
</script>
</body>
</html>
